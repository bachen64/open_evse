[samd]
extra_scripts = pre:firmware/targets/samd/build_bootloader.py
lib_deps = ${common.lib_deps}
  https://github.com/lincomatic/Adafruit_SleepyDog.git
  https://github.com/sparkfun/SparkFun_External_EEPROM_Arduino_Library.git
build_src_flags =
  -D TARGET_SAMD
  -D EEPROM_FLASH_STORE_KB=48
  -D RAPI_SERIAL_PORT=Serial1
  -I firmware/targets/samd
build_src_filter =
  ${common.build_src_filter}
  +<../targets/samd>


# SAMD OpenEVSE NXT
[env:samd]
platform = atmelsam
framework = arduino
board = zeroUSB
build_type = release
monitor_speed=115200
extra_scripts = ${samd.extra_scripts}
lib_deps = ${samd.lib_deps}
build_src_filter =
  ${samd.build_src_filter}
build_src_flags=
  ${samd.build_src_flags}
  ${common.build_flags}
  -D 'VERSION="${common.version}.SAMD"'

# SAMD OpenEVSE NXT (Atmel-ICE upload/programming)
[env:samd_ice]
extends = env:samd
upload_protocol = atmel-ice
build_type = release
extra_scripts =
  ${samd.extra_scripts}
  post:firmware/targets/samd/upload_bootloader.py

[env:samd_ice_dev] ; don't use this.. for dev/debug only
extends = env:samd
upload_protocol = atmel-ice
build_type = release ;debug
;debug_tool = atmel-ice
build_src_flags=
  -UWATCHDOG
  -UBOOTLOCK
  -UHEARTBEAT_SUPERVISION
  -DBYPASS_GFI ; disable GFI
;  -DCALIBRATE ; pilot calibration mode - for initial setup only
;  -DAMMETER_TEST ; ammeter test mode - for initial setup only





